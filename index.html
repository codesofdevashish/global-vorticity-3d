<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Real Global Vorticity Map (11 Layers)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #05050a; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div class="absolute top-4 left-4 bg-slate-900/90 backdrop-blur-md p-6 rounded-xl border border-slate-700/50 text-white max-w-sm z-10 shadow-2xl">
        <h1 class="text-xl font-bold tracking-wide text-cyan-400 mb-1">Global 3D Vorticity</h1>
        <p class="text-xs text-slate-400 mb-4">ECMWF Reanalysis Data • May 2026</p>
        
        <div class="mb-4">
            <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">Active Pressure Level</label>
            <div class="flex items-center justify-between bg-slate-800 p-2 rounded-lg border border-slate-700">
                <span id="level-display" class="text-sm font-mono text-emerald-400 font-bold">500 hPa (Mid-Trop / Storms)</span>
            </div>
            <input id="level-slider" type="range" min="0" max="10" value="6" class="w-full mt-2 accent-cyan-500 bg-slate-700 h-1 rounded-lg appearance-none cursor-pointer">
            <div class="flex justify-between text-[10px] text-slate-500 mt-1 font-mono">
                <span>1000 hPa (Surf)</span>
                <span>10 hPa (Strat)</span>
            </div>
        </div>

        <div class="space-y-2 border-t border-slate-800 pt-3 text-xs text-slate-400">
            <div class="flex justify-between"><span>Active Stream Particles:</span><span class="font-mono text-slate-200" id="particle-count">0</span></div>
            <div class="flex justify-between"><span>Data Array Source:</span><span class="font-mono text-cyan-500">Real NetCDF4 Map</span></div>
            <div class="flex justify-between"><span>Status:</span><span class="font-mono text-emerald-400 font-bold" id="status-text">Loading Data...</span></div>
        </div>
    </div>

    <div id="canvas-container" class="w-full h-screen"></div>

    <script>
        // --- 1. INITIALIZE SCENE & GLOBE STAGE ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x05050a, 0.012);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 160);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 90;
        controls.maxDistance = 250;

        // Base Earth reference wireframe lines
        const globeRadius = 60;
        const globeGeo = new THREE.SphereGeometry(globeRadius, 36, 36);
        const globeMat = new THREE.MeshBasicMaterial({
            color: 0x1e293b,
            wireframe: true,
            transparent: true,
            opacity: 0.12
        });
        const globe = new THREE.Mesh(globeGeo, globeMat);
        scene.add(globe);

        // --- 2. ENGINE APPLICATION STATES ---
        let weatherData = null; 
        let particleSystem = null;
        let particleCount = 0;
        let particleData = [];
        let positionsArray, colorsArray;

        // Exactly maps your 11 custom layers extracted in shrink.py
        const pressureLevelsText = [
            "1000 hPa (Surface)", 
            "900 hPa (Lower Boundary)",
            "850 hPa (Low-Atmosphere)", 
            "800 hPa (Low-Condensation)",
            "700 hPa (Low-Troposphere)",
            "600 hPa (Mid-Low Layer)",
            "500 hPa (Mid-Trop / Storms)", 
            "400 hPa (Upper-Mid Layer)",
            "300 hPa (Jet Stream)", 
            "200 hPa (Tropopause)",
            "10 hPa (Stratosphere)"
        ];
        let currentLevelIndex = 6; // Starts on Index 6 (500 hPa)

        // --- 3. FETCH DATA FROM PARSED JSON ---
        async function loadData() {
            try {
                // Fetch the 14.6MB data file
                const response = await fetch('./data_output.json');
                weatherData = await response.json();
                
                document.getElementById('status-text').innerText = "Online";
                document.getElementById('status-text').className = "font-mono text-emerald-400 font-bold";
                
                initParticleEngine();
            } catch (err) {
                console.error("Data loading failure: ", err);
                document.getElementById('status-text').innerText = "Data Load Error";
                document.getElementById('status-text').className = "font-mono text-rose-500 font-bold";
            }
        }

        // --- 4. DATA MATRIX RESOLUTION LOOKUP ---
        function getRealVorticity(latRad, lonRad, levelIdx) {
            if (!weatherData) return 0;

            // Convert spatial radians back to standard latitude/longitude degrees
            let latDeg = latRad * (180 / Math.PI);
            let lonDeg = lonRad * (180 / Math.PI);

            // Normalize longitude bounds from [-180, 180] back to standard GRIB [0, 360] scale
            if (lonDeg < 0) lonDeg += 360;

            const targetLats = weatherData.latitudes;
            const targetLons = weatherData.longitudes;

            // Map grid indices based on nearest lat/lon degrees
            let latIdx = Math.floor(((90 - latDeg) / 180) * (targetLats.length - 1));
            let lonIdx = Math.floor((lonDeg / 360) * (targetLons.length - 1));

            // Grid edge boundary containment guardrails
            latIdx = Math.max(0, Math.min(latIdx, targetLats.length - 1));
            lonIdx = Math.max(0, Math.min(lonIdx, targetLons.length - 1));

            return weatherData.vorticity_data[levelIdx][latIdx][lonIdx];
        }

        // --- 5. PARTICLE ENGINE SETUP ---
        function initParticleEngine() {
            // 14,000 particles create a dense fluid flow without crashing performance
            particleCount = 14000;
            document.getElementById('particle-count').innerText = particleCount.toLocaleString();

            const geometry = new THREE.BufferGeometry();
            positionsArray = new Float32Array(particleCount * 3);
            colorsArray = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                resetParticleState(i);
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positionsArray, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));

            const material = new THREE.PointsMaterial({
                size: 0.8,
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);

            animateLoop();
        }

        function resetParticleState(i) {
            // Distribute particles randomly across a uniform sphere
            const phi = Math.acos(Math.random() * 2 - 1); // Latitude polar angle
            const theta = Math.random() * Math.PI * 2;    // Longitude azimuthal angle

            particleData[i] = {
                phi: phi,
                theta: theta,
                age: 0,
                maxAge: 40 + Math.floor(Math.random() * 80)
            };

            updateGeometryBuffers(i, phi, theta);
        }

        function updateGeometryBuffers(i, phi, theta) {
            const idx = i * 3;
            // Map altitude offsets visually based on which of the 11 layers is chosen
            const dynamicRadius = globeRadius + 1.2 + (currentLevelIndex * 1.2);

            // Translate Spherical Geometry parameters into 3D Cartesian space points (X, Y, Z)
            positionsArray[idx]     = dynamicRadius * Math.sin(phi) * Math.cos(theta);
            positionsArray[idx + 1] = dynamicRadius * Math.cos(phi);
            positionsArray[idx + 2] = dynamicRadius * Math.sin(phi) * Math.sin(theta);
        }

        // --- 6. ANIMATION & WIND FLOW ADVECTION LOOP ---
        function animateLoop() {
            requestAnimationFrame(animateLoop);

            const posAttr = particleSystem.geometry.attributes.position;
            const colAttr = particleSystem.geometry.attributes.color;

            // Slowly rotate the globe to show planetary rotation
            globe.rotation.y += 0.0006;
            particleSystem.rotation.y += 0.0006;

            for (let i = 0; i < particleCount; i++) {
                let p = particleData[i];
                p.age += 1;

                if (p.age >= p.maxAge) {
                    resetParticleState(i);
                    continue;
                }

                // Look up data positions using current angles
                const latRad = Math.PI / 2 - p.phi;
                const lonRad = p.theta;

                // Query relative vorticity value from your 11-layered matrix array
                const voVal = getRealVorticity(latRad, lonRad, currentLevelIndex);

                // Multiplier turns fractional atmospheric spinning data into moving velocities
                const speedScale = voVal * 4000;
                
                // Base atmospheric zonal drift speed so elements move continuously
                const baseZonalFlow = 0.6; 

                // Dynamic vector advection displacement equations
                p.phi   -= (Math.sin(lonRad * 3) * speedScale) * 0.002;
                p.theta += (baseZonalFlow + Math.cos(latRad * 2) * speedScale) * 0.002;

                updateGeometryBuffers(i, p.phi, p.theta);

                // Color mapping: Cyclonic systems (positive spin) flash bright green/cyan.
                // Anticyclonic fields (negative spin) flow in deep pinks and crimson.
                const colorIdx = i * 3;
                const normalizedIntensity = Math.min(Math.abs(voVal) * 20000, 1.0);

                if (voVal >= 0) {
                    colorsArray[colorIdx]     = 0.0;
                    colorsArray[colorIdx + 1] = 0.3 + (normalizedIntensity * 0.7); // Bright Green
                    colorsArray[colorIdx + 2] = 0.6 + (normalizedIntensity * 0.4); // Deep Cyan
                } else {
                    colorsArray[colorIdx]     = 0.5 + (normalizedIntensity * 0.5); // Warm Crimson
                    colorsArray[colorIdx + 1] = 0.1;
                    colorsArray[colorIdx + 2] = 0.4;
                }
            }

            // Tell the GPU to update the particle coordinates on the screen
            posAttr.needsUpdate = true;
            colAttr.needsUpdate = true;

            controls.update();
            renderer.render(scene, camera);
        }

        // --- 7. SLIDER UI BINDINGS ---
        const slider = document.getElementById('level-slider');
        const display = document.getElementById('level-display');

        slider.addEventListener('input', (e) => {
            currentLevelIndex = parseInt(e.target.value);
            display.innerText = pressureLevelsText[currentLevelIndex];
            
            // Re-render and position particles instantly when shifting height layers
            if (particleSystem) {
                for (let i = 0; i < particleCount; i++) {
                    resetParticleState(i);
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Bootstrap sequence
        loadData();
    </script>
</body>
</html>
