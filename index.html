<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Global Vorticity Map & 12h Motion Trails</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020408; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div class="absolute top-4 left-4 bg-slate-950/90 backdrop-blur-md p-6 rounded-xl border border-slate-800 text-white max-w-sm z-10 shadow-2xl">
        <h1 class="text-xl font-bold tracking-wide text-cyan-400 mb-1">Global 3D Vorticity</h1>
        <p class="text-xs text-slate-400 mb-4">ECMWF Reanalysis Data • May 2026</p>
        
        <div class="mb-4">
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Active Pressure Level</label>
            <div class="flex items-center justify-between bg-slate-900 p-2 rounded-lg border border-slate-800">
                <span id="level-display" class="text-sm font-mono text-emerald-400 font-bold">500 hPa (Mid-Trop / Storms)</span>
            </div>
            <input id="level-slider" type="range" min="0" max="10" value="6" class="w-full mt-2 accent-cyan-500 bg-slate-800 h-1 rounded-lg appearance-none cursor-pointer">
            <div class="flex justify-between text-[10px] text-slate-500 mt-1 font-mono">
                <span>1000 hPa (Surf)</span>
                <span>10 hPa (Strat)</span>
            </div>
        </div>

        <div class="space-y-2 border-t border-slate-900 pt-3 text-xs text-slate-400">
            <div class="flex justify-between"><span>Stream Vectors:</span><span class="font-mono text-slate-200" id="particle-count">0</span></div>
            <div class="flex justify-between"><span>Visual Mode:</span><span class="font-mono text-cyan-500">12h Line Path Trails</span></div>
            <div class="flex justify-between"><span>Status:</span><span class="font-mono text-emerald-400 font-bold" id="status-text">Loading Data...</span></div>
        </div>
    </div>

    <div class="absolute bottom-6 right-6 bg-slate-950/90 backdrop-blur-md px-4 py-3 rounded-lg border border-slate-800 text-white z-10 shadow-2xl text-xs max-w-xs">
        <p class="font-semibold text-slate-300 mb-2 tracking-wide uppercase text-[10px]">Relative Vorticity Legend (s⁻¹)</p>
        <div class="h-3 w-full rounded bg-gradient-to-r from-red-600 via-orange-400 via-slate-800 via-cyan-500 to-emerald-400"></div>
        <div class="flex justify-between font-mono text-[10px] text-slate-400 mt-1 gap-4">
            <span>-5.0×10⁻⁴<br><span class="text-red-400">Anticyclonic</span></span>
            <span class="text-center">0.0<br>Neutral</span>
            <span class="text-right">+5.0×10⁻⁴<br><span class="text-emerald-400">Cyclonic</span></span>
        </div>
    </div>

    <div id="canvas-container" class="w-full h-screen"></div>

    <script>
        // --- 1. INITIALIZE SCENE & GLOBE STAGE ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 40, 140); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 75;
        controls.maxDistance = 220;

        const globeRadius = 60;

        // --- 2. LIGHTING CONFIGURATIONS ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 0.3);
        sunLight.position.set(5, 3, 5);
        scene.add(sunLight);

        // --- 3. PHOTO SATELLITE GLOBE ---
        const textureLoader = new THREE.TextureLoader();
        const satelliteTexture = textureLoader.load(
            'https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg',
            function() { renderer.render(scene, camera); }
        );
        const specularTexture = textureLoader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');

        const landGlobeGeo = new THREE.SphereGeometry(globeRadius, 64, 64);
        const landGlobeMat = new THREE.MeshPhongMaterial({
            map: satelliteTexture,
            specularMap: specularTexture,
            specular: new THREE.Color('#111111'),
            shininess: 20
        });
        const landGlobe = new THREE.Mesh(landGlobeGeo, landGlobeMat);
        scene.add(landGlobe);

        // --- 4. ENGINE RUNTIME PARAMETERS ---
        let weatherData = null; 
        let trailLineSystem = null;
        
        // Balanced to manage execution costs: 4,000 global lines * 12 history segments each = 48,000 lines drawn concurrently
        const totalStreams = 4000; 
        const segmentsPerStream = 12; // Captures 12 steps of history to form a trail line
        const totalPointsCount = totalStreams * segmentsPerStream;

        let streamHistoryData = [];
        let linePositions, lineColors;

        const pressureLevelsText = [
            "1000 hPa (Surface)", "900 hPa (Lower Boundary)", "850 hPa (Low-Atmosphere)", 
            "800 hPa (Low-Condensation)", "700 hPa (Low-Troposphere)", "600 hPa (Mid-Low Layer)",
            "500 hPa (Mid-Trop / Storms)", "400 hPa (Upper-Mid Layer)", "300 hPa (Jet Stream)", 
            "200 hPa (Tropopause)", "10 hPa (Stratosphere)"
        ];
        let currentLevelIndex = 6; 

        // --- 5. DATA INGESTION ---
        async function loadData() {
            try {
                const response = await fetch('./data_output.json');
                weatherData = await response.json();
                
                document.getElementById('status-text').innerText = "Online";
                document.getElementById('status-text').className = "font-mono text-emerald-400 font-bold";
                
                initLineTrailEngine();
            } catch (err) {
                console.error("Data ingestion processing fault: ", err);
                document.getElementById('status-text').innerText = "Data Load Error";
            }
        }

        // --- 6. SCIENTIFIC DATA MATRIX INTERPOLATOR ---
        function getRealVorticity(latRad, lonRad, levelIdx) {
            if (!weatherData) return 0;

            let latDeg = latRad * (180 / Math.PI);
            let lonDeg = lonRad * (180 / Math.PI);
            if (lonDeg < 0) lonDeg += 360;

            const targetLats = weatherData.latitudes;
            const targetLons = weatherData.longitudes;

            let latIdx = Math.floor(((90 - latDeg) / 180) * (targetLats.length - 1));
            let lonIdx = Math.floor((lonDeg / 360) * (targetLons.length - 1));

            latIdx = Math.max(0, Math.min(latIdx, targetLats.length - 1));
            lonIdx = Math.max(0, Math.min(lonIdx, targetLons.length - 1));

            return weatherData.vorticity_data[levelIdx][latIdx][lonIdx];
        }

        // --- 7. LINE VECTOR ENGINE LAYOUTS ---
        function initLineTrailEngine() {
            document.getElementById('particle-count').innerText = (totalStreams).toLocaleString();

            const geometry = new THREE.BufferGeometry();
            linePositions = new Float32Array(totalPointsCount * 3);
            lineColors = new Float32Array(totalPointsCount * 3);

            // Initialize position states for each vector timeline stream
            for (let s = 0; s < totalStreams; s++) {
                const phi = Math.acos(Math.random() * 2 - 1);
                const theta = Math.random() * Math.PI * 2;
                
                streamHistoryData[s] = {
                    phi: phi,
                    theta: theta,
                    age: Math.floor(Math.random() * 50),
                    maxAge: 40 + Math.floor(Math.random() * 40),
                    history: [] // Holds standard structural coordinate objects: {x, y, z, vo}
                };

                // Pre-fill initial trail history arrays so lines don't spike to the coordinate core (0,0,0) at boot
                const pos = calculateCartesianCoordinates(phi, theta);
                for (let h = 0; h < segmentsPerStream; h++) {
                    streamHistoryData[s].history.push({ x: pos.x, y: pos.y, z: pos.z, vo: 0 });
                }
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(lineColors, 3));

            // Custom line shaders to scale down thickness and blend alpha cleanly down the trail length
            const material = new THREE.ShaderMaterial({
                vertexShader: `
                    attribute vec3 color;
                    varying vec3 vColor;
                    void main() {
                        vColor = color;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        // Renders a sleek, thin vector path directly on top of the terrain map
                        gl_FragColor = vec4(vColor, 0.75);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                linewidth: 1.2 // Keeps lines crisp and non-cluttered
            });

            // THREE.LineSegments draws lines sequentially connecting index pairs: (0 to 1), (1 to 2)...
            trailLineSystem = new THREE.LineSegments(geometry, material);
            scene.add(trailLineSystem);

            animateLoop();
        }

        function calculateCartesianCoordinates(phi, theta) {
            const currentAltRadius = globeRadius + 0.6 + (currentLevelIndex * 0.2);
            return {
                x: currentAltRadius * Math.sin(phi) * Math.cos(theta),
                y: currentAltRadius * Math.cos(phi),
                z: currentAltRadius * Math.sin(phi) * Math.sin(theta)
            };
        }

        // --- 8. VECTOR PHYSICS & ROTATION RUNTIME LOOP ---
        function animateLoop() {
            requestAnimationFrame(animateLoop);

            // Rotate the satellite globe and vectors uniformly
            landGlobe.rotation.y += 0.0002;
            trailLineSystem.rotation.y += 0.0002;

            let bufferIdx = 0;

            for (let s = 0; s < totalStreams; s++) {
                let stream = streamHistoryData[s];
                stream.age += 1;

                // Physics update calculations
                const latRad = Math.PI / 2 - stream.phi;
                const lonRad = stream.theta;

                const voVal = getRealVorticity(latRad, lonRad, currentLevelIndex);
                const speedScale = voVal * 4200;
                const baseZonalFlow = 0.45; // Smooth prevailing horizontal currents

                // Update physical coordinate positions
                stream.phi   -= (Math.sin(lonRad * 3) * speedScale) * 0.0018;
                stream.theta += (baseZonalFlow + Math.cos(latRad * 2) * speedScale) * 0.0018;

                // If stream expires or wanders near poles, respawn it elsewhere
                if (stream.age >= stream.maxAge || stream.phi <= 0.05 || stream.phi >= Math.PI - 0.05) {
                    stream.phi = Math.acos(Math.random() * 2 - 1);
                    stream.theta = Math.random() * Math.PI * 2;
                    stream.age = 0;
                    stream.maxAge = 40 + Math.floor(Math.random() * 40);
                    
                    const freshPos = calculateCartesianCoordinates(stream.phi, stream.theta);
                    stream.history = [];
                    for (let h = 0; h < segmentsPerStream; h++) {
                        stream.history.push({ x: freshPos.x, y: freshPos.y, z: freshPos.z, vo: voVal });
                    }
                } else {
                    // Standard update step: push newest coordinate onto the head of the trail history line
                    const nextPos = calculateCartesianCoordinates(stream.phi, stream.theta);
                    stream.history.push({ x: nextPos.x, y: nextPos.y, z: nextPos.z, vo: voVal });
                    // Drop oldest tracking coordinate step to keep the trail length constant
                    if (stream.history.length > segmentsPerStream) {
                        stream.history.shift();
                    }
                }

                // Map coordinate arrays into the system WebGL buffers
                for (let h = 0; h < segmentsPerStream - 1; h++) {
                    const pStart = stream.history[h];
                    const pEnd = stream.history[h + 1];

                    // First point segment linkage definition
                    linePositions[bufferIdx]     = pStart.x;
                    linePositions[bufferIdx + 1] = pStart.y;
                    linePositions[bufferIdx + 2] = pStart.z;

                    // Second point segment linkage definition
                    linePositions[bufferIdx + 3] = pEnd.x;
                    linePositions[bufferIdx + 4] = pEnd.y;
                    linePositions[bufferIdx + 5] = pEnd.z;

                    // Fade out tail lines gradually by scaling color intensity down the array structure
                    const segmentFadeRatio = h / (segmentsPerStream - 1); 
                    const normalizedIntensity = Math.min(Math.abs(pStart.vo) * 24000, 1.0);

                    if (pStart.vo >= 0) {
                        // Cyan Cyclonic paths fade cleanly to deep blue over time
                        lineColors[bufferIdx]     = 0.0;
                        lineColors[bufferIdx + 1] = (0.3 + (normalizedIntensity * 0.7)) * segmentFadeRatio;
                        lineColors[bufferIdx + 2] = 1.0 * segmentFadeRatio;

                        lineColors[bufferIdx + 3] = 0.0;
                        lineColors[bufferIdx + 4] = (0.3 + (normalizedIntensity * 0.7)) * segmentFadeRatio;
                        lineColors[bufferIdx + 5] = 1.0 * segmentFadeRatio;
                    } else {
                        // Fiery Orange Anticyclonic tracks fade smoothly down the loop hierarchy
                        lineColors[bufferIdx]     = 1.0 * segmentFadeRatio;
                        lineColors[bufferIdx + 1] = (0.2 + (normalizedIntensity * 0.5)) * segmentFadeRatio;
                        lineColors[bufferIdx + 2] = 0.1 * segmentFadeRatio;

                        lineColors[bufferIdx + 3] = 1.0 * segmentFadeRatio;
                        lineColors[bufferIdx + 4] = (0.2 + (normalizedIntensity * 0.5)) * segmentFadeRatio;
                        lineColors[bufferIdx + 5] = 0.1 * segmentFadeRatio;
                    }

                    bufferIdx += 6; 
                }
            }

            trailLineSystem.geometry.attributes.position.needsUpdate = true;
            trailLineSystem.geometry.attributes.color.needsUpdate = true;

            controls.update();
            renderer.render(scene, camera);
        }

        // --- 9. INTERACTIVE SYSTEM HANDLERS ---
        const slider = document.getElementById('level-slider');
        const display = document.getElementById('level-display');

        slider.addEventListener('input', (e) => {
            currentLevelIndex = parseInt(e.target.value);
            display.innerText = pressureLevelsText[currentLevelIndex];
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        loadData();
    </script>
</body>
</html>
