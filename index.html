<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Global Vorticity Map & 12h Motion Trails</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #060913; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div class="absolute top-4 left-4 bg-slate-950/95 backdrop-blur-md p-6 rounded-xl border border-slate-800 text-white max-w-sm z-10 shadow-2xl">
        <h1 class="text-xl font-bold tracking-wide text-cyan-400 mb-1">Global 3D Vorticity</h1>
        <p class="text-xs text-slate-400 mb-4">ECMWF Reanalysis Data • May 2026</p>
        
        <div class="mb-4">
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Active Pressure Level</label>
            <div class="flex items-center justify-between bg-slate-900 p-2 rounded-lg border border-slate-800">
                <span id="level-display" class="text-sm font-mono text-emerald-400 font-bold">500 hPa (Mid-Trop / Storms)</span>
            </div>
            <input id="level-slider" type="range" min="0" max="10" value="6" class="w-full mt-2 accent-cyan-500 bg-slate-800 h-1 rounded-lg appearance-none cursor-pointer">
            <div class="flex justify-between text-[10px] text-slate-500 mt-1 font-mono">
                <span>1000 hPa (Surf)</span>
                <span>10 hPa (Strat)</span>
            </div>
        </div>

        <div class="space-y-2 border-t border-slate-900 pt-3 text-xs text-slate-400">
            <div class="flex justify-between"><span>Active Stream Particles:</span><span class="font-mono text-slate-200" id="particle-count">0</span></div>
            <div class="flex justify-between"><span>Visual Mode:</span><span class="font-mono text-cyan-500">12h Path Trails</span></div>
            <div class="flex justify-between"><span>Status:</span><span class="font-mono text-emerald-400 font-bold" id="status-text">Loading Data...</span></div>
        </div>
    </div>

    <div class="absolute bottom-6 right-6 bg-slate-950/90 backdrop-blur-md px-4 py-3 rounded-lg border border-slate-800 text-white z-10 shadow-2xl text-xs max-w-xs">
        <p class="font-semibold text-slate-300 mb-2 tracking-wide uppercase text-[10px]">Relative Vorticity Legend ($s^{-1}$)</p>
        <div class="h-3 w-full rounded bg-gradient-to-r from-red-600 via-orange-400 via-slate-800 via-cyan-500 to-emerald-400"></div>
        <div class="flex justify-between font-mono text-[10px] text-slate-400 mt-1">
            <span>-5.0×10⁻⁴<br><span class="text-red-400">Anticyclonic (High)</span></span>
            <span class="text-center">0.0<br>Neutral</span>
            <span class="text-right">+5.0×10⁻⁴<br><span class="text-emerald-400">Cyclonic (Storms)</span></span>
        </div>
    </div>

    <div id="canvas-container" class="w-full h-screen"></div>

    <script>
        // --- 1. INITIALIZE SCENE & GLOBE STAGE ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 140);

        // Turn preserveDrawingBuffer TRUE so old particle frames stay on screen to build lines
        const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Lock resolution multiplier
        renderer.autoClear = false; // Prevent WebGL from instantly wiping everything out
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 75;
        controls.maxDistance = 220;

        const globeRadius = 60;

        // --- 2. THE GEOMETRICAL BASE GLOBE GROUP ---
        // Placing everything inside a main group makes it simple to turn together
        const globeGroup = new THREE.Group();
        scene.add(globeGroup);

        // A highly reflective solid sphere base representing the Earth
        const solidGlobeGeo = new THREE.SphereGeometry(globeRadius - 0.4, 45, 45);
        const solidGlobeMat = new THREE.MeshBasicMaterial({
            color: 0x070d1a, // Dark slate-blue base hue
        });
        const solidGlobe = new THREE.Mesh(solidGlobeGeo, solidGlobeMat);
        globeGroup.add(solidGlobe);

        // A bright geometric blueprint grid layout (Every 15 degrees)
        const gridGeo = new THREE.SphereGeometry(globeRadius, 24, 12);
        const gridMat = new THREE.MeshBasicMaterial({
            color: 0x1e293b, 
            wireframe: true,
            transparent: true,
            opacity: 0.6 // Increased opacity for explicit visibility
        });
        const gridGlobe = new THREE.Mesh(gridGeo, gridMat);
        globeGroup.add(gridGlobe);

        // Add a bold horizontal neon ring identifying the Equator
        const equatorGeo = new THREE.TorusGeometry(globeRadius + 0.1, 0.1, 4, 64);
        const equatorMat = new THREE.MeshBasicMaterial({ color: 0x334155, transparent: true, opacity: 0.7 });
        const equator = new THREE.Mesh(equatorGeo, equatorMat);
        equator.rotation.x = Math.PI / 2;
        globeGroup.add(equator);

        // --- 3. ENGINE APPLICATION DATA STATES ---
        let weatherData = null; 
        let particleSystem = null;
        let particleCount = 0;
        let particleData = [];
        let positionsArray, colorsArray;

        const pressureLevelsText = [
            "1000 hPa (Surface)", "900 hPa (Lower Boundary)", "850 hPa (Low-Atmosphere)", 
            "800 hPa (Low-Condensation)", "700 hPa (Low-Troposphere)", "600 hPa (Mid-Low Layer)",
            "500 hPa (Mid-Trop / Storms)", "400 hPa (Upper-Mid Layer)", "300 hPa (Jet Stream)", 
            "200 hPa (Tropopause)", "10 hPa (Stratosphere)"
        ];
        let currentLevelIndex = 6; 

        // --- 4. FETCH DATA FROM PARSED JSON ---
        async function loadData() {
            try {
                const response = await fetch('./data_output.json');
                weatherData = await response.json();
                
                document.getElementById('status-text').innerText = "Online";
                document.getElementById('status-text').className = "font-mono text-emerald-400 font-bold";
                
                initParticleEngine();
            } catch (err) {
                console.error("Data loading failure: ", err);
                document.getElementById('status-text').innerText = "Data Load Error";
            }
        }

        // --- 5. DATA MATRIX RESOLUTION LOOKUP ---
        function getRealVorticity(latRad, lonRad, levelIdx) {
            if (!weatherData) return 0;

            let latDeg = latRad * (180 / Math.PI);
            let lonDeg = lonRad * (180 / Math.PI);
            if (lonDeg < 0) lonDeg += 360;

            const targetLats = weatherData.latitudes;
            const targetLons = weatherData.longitudes;

            let latIdx = Math.floor(((90 - latDeg) / 180) * (targetLats.length - 1));
            let lonIdx = Math.floor((lonDeg / 360) * (targetLons.length - 1));

            latIdx = Math.max(0, Math.min(latIdx, targetLats.length - 1));
            lonIdx = Math.max(0, Math.min(lonIdx, targetLons.length - 1));

            return weatherData.vorticity_data[levelIdx][latIdx][lonIdx];
        }

        // --- 6. CUSTOM PARTICLE ENGINES (WITH SHADER SCALING) ---
        function initParticleEngine() {
            particleCount = 20000; 
            document.getElementById('particle-count').innerText = particleCount.toLocaleString();

            const geometry = new THREE.BufferGeometry();
            positionsArray = new Float32Array(particleCount * 3);
            colorsArray = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                resetParticleState(i);
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positionsArray, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));

            // CUSTOM WEBGL SHADER: Fixes giant blocky square issues!
            // This forces particle points to stay thin, razor-sharp vector points regardless of monitor pixel density.
            const material = new THREE.ShaderMaterial({
                vertexShader: `
                    attribute vec3 color;
                    varying vec3 vColor;
                    void main() {
                        vColor = color;
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        // Scales point thickness perfectly based on camera distance (Z-depth)
                        gl_PointSize = 1.8 * (140.0 / -mvPosition.z); 
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        // Makes the vector dots clean round circles rather than square boxes
                        if (length(gl_PointCoord - vec2(0.5)) > 0.5) discard;
                        gl_FragColor = vec4(vColor, 0.85);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);

            // A localized transparent mesh placed in front of the camera to create the trail decay
            const fadeOverlayGeo = new THREE.PlaneGeometry(2, 2);
            const fadeOverlayMat = new THREE.MeshBasicMaterial({
                color: 0x060913, // Matches space background color
                transparent: true,
                opacity: 0.05   // Lower number = longer 12h-style vector paths!
            });
            fadeOverlay = new THREE.Mesh(fadeOverlayGeo, fadeOverlayMat);
            
            animateLoop();
        }

        function resetParticleState(i) {
            const phi = Math.acos(Math.random() * 2 - 1);
            const theta = Math.random() * Math.PI * 2;

            particleData[i] = {
                phi: phi,
                theta: theta,
                age: 0,
                maxAge: 20 + Math.floor(Math.random() * 40)
            };

            updateGeometryBuffers(i, phi, theta);
        }

        function updateGeometryBuffers(i, phi, theta) {
            const idx = i * 3;
            const dynamicRadius = globeRadius + 0.4 + (currentLevelIndex * 0.4);

            positionsArray[idx]     = dynamicRadius * Math.sin(phi) * Math.cos(theta);
            positionsArray[idx + 1] = dynamicRadius * Math.cos(phi);
            positionsArray[idx + 2] = dynamicRadius * Math.sin(phi) * Math.sin(theta);
        }

        // --- 7. DYNAMIC WIND TRAIL DOUBLE-RENDER LOOP ---
        function animateLoop() {
            requestAnimationFrame(animateLoop);

            // CRITICAL TECHNIQUE FOR TRAILS & HIGH VISIBILITY GLOBES:
            // 1. We tell the renderer to wipe out the old background layer using a fading black curtain.
            renderer.clearDepth(); 
            scene.add(camera);
            camera.add(fadeOverlay);
            fadeOverlay.position.set(0, 0, -1); 
            
            // 2. Animate and step positions
            globeGroup.rotation.y += 0.0003;
            particleSystem.rotation.y += 0.0003;

            const posAttr = particleSystem.geometry.attributes.position;
            const colAttr = particleSystem.geometry.attributes.color;

            for (let i = 0; i < particleCount; i++) {
                let p = particleData[i];
                p.age += 1;

                if (p.age >= p.maxAge) {
                    resetParticleState(i);
                    continue;
                }

                const latRad = Math.PI / 2 - p.phi;
                const lonRad = p.theta;

                const voVal = getRealVorticity(latRad, lonRad, currentLevelIndex);
                const speedScale = voVal * 4500;
                const baseZonalFlow = 0.45; 

                p.phi   -= (Math.sin(lonRad * 3) * speedScale) * 0.002;
                p.theta += (baseZonalFlow + Math.cos(latRad * 2) * speedScale) * 0.002;

                updateGeometryBuffers(i, p.phi, p.theta);

                const colorIdx = i * 3;
                const normalizedIntensity = Math.min(Math.abs(voVal) * 25000, 1.0);

                // High-visibility color channels
                if (voVal >= 0) {
                    colorsArray[colorIdx]     = 0.0;
                    colorsArray[colorIdx + 1] = 0.5 + (normalizedIntensity * 0.5); // Radiant Storm Green/Cyan
                    colorsArray[colorIdx + 2] = 0.8 + (normalizedIntensity * 0.2);
                } else {
                    colorsArray[colorIdx]     = 0.9 + (normalizedIntensity * 0.1); // Bright Crimson Anticyclones
                    colorsArray[colorIdx + 1] = 0.2;
                    colorsArray[colorIdx + 2] = 0.3;
                }
            }

            posAttr.needsUpdate = true;
            colAttr.needsUpdate = true;
            controls.update();

            // 3. Render the particle trails onto the screen
            renderer.render(scene, camera);
            
            // 4. Clean the camera overlay and instantly re-render the solid globe on top.
            // This forces the physical reference sphere to stay perfectly visible behind the trails without erasing them!
            camera.remove(fadeOverlay);
            scene.remove(camera);
            
            renderer.clear(false, true, false); // Clear only the depth buffer to draw solid models cleanly
            renderer.render(globeGroup, camera);
        }

        // --- 8. UI SLIDER CONTROLS ---
        const slider = document.getElementById('level-slider');
        const display = document.getElementById('level-display');

        slider.addEventListener('input', (e) => {
            currentLevelIndex = parseInt(e.target.value);
            display.innerText = pressureLevelsText[currentLevelIndex];
            
            renderer.clear();
            if (particleSystem) {
                for (let i = 0; i < particleCount; i++) {
                    resetParticleState(i);
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        loadData();
    </script>
</body>
</html>
