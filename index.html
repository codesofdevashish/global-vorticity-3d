<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Real Global Vorticity Map (Windy-Style Trails)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #05050a; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div class="absolute top-4 left-4 bg-slate-900/90 backdrop-blur-md p-6 rounded-xl border border-slate-700/50 text-white max-w-sm z-10 shadow-2xl">
        <h1 class="text-xl font-bold tracking-wide text-cyan-400 mb-1">Global 3D Vorticity</h1>
        <p class="text-xs text-slate-400 mb-4">ECMWF Reanalysis Data • May 2026</p>
        
        <div class="mb-4">
            <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">Active Pressure Level</label>
            <div class="flex items-center justify-between bg-slate-800 p-2 rounded-lg border border-slate-700">
                <span id="level-display" class="text-sm font-mono text-emerald-400 font-bold">500 hPa (Mid-Trop / Storms)</span>
            </div>
            <input id="level-slider" type="range" min="0" max="10" value="6" class="w-full mt-2 accent-cyan-500 bg-slate-700 h-1 rounded-lg appearance-none cursor-pointer">
            <div class="flex justify-between text-[10px] text-slate-500 mt-1 font-mono">
                <span>1000 hPa (Surf)</span>
                <span>10 hPa (Strat)</span>
            </div>
        </div>

        <div class="space-y-2 border-t border-slate-800 pt-3 text-xs text-slate-400">
            <div class="flex justify-between"><span>Active Stream Particles:</span><span class="font-mono text-slate-200" id="particle-count">0</span></div>
            <div class="flex justify-between"><span>Visual Mode:</span><span class="font-mono text-cyan-500">12h Path Trails</span></div>
            <div class="flex justify-between"><span>Status:</span><span class="font-mono text-emerald-400 font-bold" id="status-text">Loading Data...</span></div>
        </div>
    </div>

    <div id="canvas-container" class="w-full h-screen"></div>

    <script>
        // --- 1. INITIALIZE SCENE & GLOBE STAGE ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 160);

        // WINDY-STYLE EFFCT: Enable "preserveDrawingBuffer" so we can manually fade past frames
        const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.autoClearColor = false; // Stop the renderer from instantly wiping particle trails
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 90;
        controls.maxDistance = 250;

        const globeRadius = 60;

        // --- 2. ADD LAND AND SEA BOUNDARIES ---
        // We project a high-resolution outline map of world continents directly onto our 3D globe geometry
        const textureLoader = new THREE.TextureLoader();
        // Using a reliable open-source global coastlines texture map
        const mapUrl = 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmosphere.jpg';
        
        const globeGeo = new THREE.SphereGeometry(globeRadius, 45, 45);
        const globeMat = new THREE.MeshBasicMaterial({
            map: textureLoader.load(mapUrl),
            color: 0x111c30, // Deep ocean base color
            wireframe: false,
            transparent: true,
            opacity: 0.6
        });
        const globe = new THREE.Mesh(globeGeo, globeMat);
        scene.add(globe);

        // Add an extra glowing outline grid for grid reference lines
        const gridGeo = new THREE.SphereGeometry(globeRadius + 0.1, 30, 15);
        const gridMat = new THREE.MeshBasicMaterial({
            color: 0x334155,
            wireframe: true,
            transparent: true,
            opacity: 0.15
        });
        const gridGlobe = new THREE.Mesh(gridGeo, gridMat);
        scene.add(gridGlobe);

        // --- 3. ENGINE APPLICATION STATES ---
        let weatherData = null; 
        let particleSystem = null;
        let particleCount = 0;
        let particleData = [];
        let positionsArray, colorsArray;

        const pressureLevelsText = [
            "1000 hPa (Surface)", "900 hPa (Lower Boundary)", "850 hPa (Low-Atmosphere)", 
            "800 hPa (Low-Condensation)", "700 hPa (Low-Troposphere)", "600 hPa (Mid-Low Layer)",
            "500 hPa (Mid-Trop / Storms)", "400 hPa (Upper-Mid Layer)", "300 hPa (Jet Stream)", 
            "200 hPa (Tropopause)", "10 hPa (Stratosphere)"
        ];
        let currentLevelIndex = 6; 

        // --- 4. FETCH DATA FROM PARSED JSON ---
        async function loadData() {
            try {
                const response = await fetch('./data_output.json');
                weatherData = await response.json();
                
                document.getElementById('status-text').innerText = "Online";
                document.getElementById('status-text').className = "font-mono text-emerald-400 font-bold";
                
                initParticleEngine();
            } catch (err) {
                console.error("Data loading failure: ", err);
                document.getElementById('status-text').innerText = "Data Load Error";
            }
        }

        // --- 5. DATA MATRIX RESOLUTION LOOKUP ---
        function getRealVorticity(latRad, lonRad, levelIdx) {
            if (!weatherData) return 0;

            let latDeg = latRad * (180 / Math.PI);
            let lonDeg = lonRad * (180 / Math.PI);
            if (lonDeg < 0) lonDeg += 360;

            const targetLats = weatherData.latitudes;
            const targetLons = weatherData.longitudes;

            let latIdx = Math.floor(((90 - latDeg) / 180) * (targetLats.length - 1));
            let lonIdx = Math.floor((lonDeg / 360) * (targetLons.length - 1));

            latIdx = Math.max(0, Math.min(latIdx, targetLats.length - 1));
            lonIdx = Math.max(0, Math.min(lonIdx, targetLons.length - 1));

            return weatherData.vorticity_data[levelIdx][latIdx][lonIdx];
        }

        // --- 6. PARTICLE ENGINE SETUP ---
        function initParticleEngine() {
            particleCount = 18000; // More particles fill out the lines beautifully
            document.getElementById('particle-count').innerText = particleCount.toLocaleString();

            const geometry = new THREE.BufferGeometry();
            positionsArray = new Float32Array(particleCount * 3);
            colorsArray = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                resetParticleState(i);
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positionsArray, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));

            const material = new THREE.PointsMaterial({
                size: 0.9,
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);

            // Set up a semi-transparent screen overlay mesh to slowly hide old particle points
            // This creates the perfect trailing fluid lines!
            const fadeOverlayGeo = new THREE.PlaneGeometry(2, 2);
            fadeOverlayMat = new THREE.MeshBasicMaterial({
                color: 0x05050a,
                transparent: true,
                opacity: 0.08  // Adjust this opacity to make trails longer (lower number) or shorter (higher number)
            });
            fadeOverlay = new THREE.Mesh(fadeOverlayGeo, fadeOverlayMat);
            fadeOverlay.material.depthTest = false;
            fadeOverlay.material.depthWrite = false;

            animateLoop();
        }

        function resetParticleState(i) {
            const phi = Math.acos(Math.random() * 2 - 1);
            const theta = Math.random() * Math.PI * 2;

            particleData[i] = {
                phi: phi,
                theta: theta,
                age: 0,
                maxAge: 30 + Math.floor(Math.random() * 50) // Shorter lifespan keeps trails fresh
            };

            updateGeometryBuffers(i, phi, theta);
        }

        function updateGeometryBuffers(i, phi, theta) {
            const idx = i * 3;
            const dynamicRadius = globeRadius + 0.5 + (currentLevelIndex * 0.8);

            positionsArray[idx]     = dynamicRadius * Math.sin(phi) * Math.cos(theta);
            positionsArray[idx + 1] = dynamicRadius * Math.cos(phi);
            positionsArray[idx + 2] = dynamicRadius * Math.sin(phi) * Math.sin(theta);
        }

        // --- 7. WIND FLOW TRAIL ANIMATION LOOP ---
        function animateLoop() {
            requestAnimationFrame(animateLoop);

            // 1. Draw a fading black curtain over the screen before drawing the new positions.
            // This leaves the last few frames slightly visible, creating the "12-hour path trail" lines.
            renderer.getClearColor(fadeOverlayMat.color);
            scene.add(camera);
            camera.add(fadeOverlay);
            fadeOverlay.position.set(0, 0, -1); // Anchor directly in front of camera view

            const posAttr = particleSystem.geometry.attributes.position;
            const colAttr = particleSystem.geometry.attributes.color;

            // Slowly spin our base earth maps
            globe.rotation.y += 0.0004;
            gridGlobe.rotation.y += 0.0004;
            particleSystem.rotation.y += 0.0004;

            for (let i = 0; i < particleCount; i++) {
                let p = particleData[i];
                p.age += 1;

                if (p.age >= p.maxAge) {
                    resetParticleState(i);
                    continue;
                }

                const latRad = Math.PI / 2 - p.phi;
                const lonRad = p.theta;

                const voVal = getRealVorticity(latRad, lonRad, currentLevelIndex);
                const speedScale = voVal * 4500;
                const baseZonalFlow = 0.5; // Constant global trade-wind movement

                // Fluid vector step shifting
                p.phi   -= (Math.sin(lonRad * 3) * speedScale) * 0.002;
                p.theta += (baseZonalFlow + Math.cos(latRad * 2) * speedScale) * 0.002;

                updateGeometryBuffers(i, p.phi, p.theta);

                const colorIdx = i * 3;
                const normalizedIntensity = Math.min(Math.abs(voVal) * 22000, 1.0);

                // Color profiles matching rotation energy scales
                if (voVal >= 0) {
                    colorsArray[colorIdx]     = 0.0;
                    colorsArray[colorIdx + 1] = 0.4 + (normalizedIntensity * 0.6); // Cyan-Green currents
                    colorsArray[colorIdx + 2] = 0.7 + (normalizedIntensity * 0.3);
                } else {
                    colorsArray[colorIdx]     = 0.6 + (normalizedIntensity * 0.4); // Deep orange-crimson streams
                    colorsArray[colorIdx + 1] = 0.1;
                    colorsArray[colorIdx + 2] = 0.4;
                }
            }

            posAttr.needsUpdate = true;
            colAttr.needsUpdate = true;

            controls.update();
            
            // Render everything smoothly
            renderer.render(scene, camera);
            
            // Clean out the camera layout frame for the next pass
            camera.remove(fadeOverlay);
            scene.remove(camera);
        }

        // --- 8. UI SLIDER ADJUSTMENTS ---
        const slider = document.getElementById('level-slider');
        const display = document.getElementById('level-display');

        slider.addEventListener('input', (e) => {
            currentLevelIndex = parseInt(e.target.value);
            display.innerText = pressureLevelsText[currentLevelIndex];
            
            // Flush and clear screen instantly when changing levels to avoid messy blending overlaps
            renderer.clear();
            if (particleSystem) {
                for (let i = 0; i < particleCount; i++) {
                    resetParticleState(i);
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        loadData();
    </script>
</body>
</html>
