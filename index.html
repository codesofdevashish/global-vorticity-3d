<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Global Vorticity Map & Motion Trails</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020408; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div class="absolute top-4 left-4 bg-slate-950/90 backdrop-blur-md p-6 rounded-xl border border-slate-800 text-white max-w-sm z-10 shadow-2xl">
        <h1 class="text-xl font-bold tracking-wide text-cyan-400 mb-1">Global 3D Vorticity</h1>
        <p class="text-xs text-slate-400 mb-4">ECMWF Reanalysis Data • May 2026</p>
        
        <div class="mb-4">
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Active Pressure Level</label>
            <div class="flex items-center justify-between bg-slate-900 p-2 rounded-lg border border-slate-800">
                <span id="level-display" class="text-sm font-mono text-emerald-400 font-bold">500 hPa (Mid-Trop / Storms)</span>
            </div>
            <input id="level-slider" type="range" min="0" max="10" value="6" class="w-full mt-2 accent-cyan-500 bg-slate-800 h-1 rounded-lg appearance-none cursor-pointer">
            <div class="flex justify-between text-[10px] text-slate-500 mt-1 font-mono">
                <span>1000 hPa (Surf)</span>
                <span>10 hPa (Strat)</span>
            </div>
        </div>

        <div class="space-y-2 border-t border-slate-900 pt-3 text-xs text-slate-400">
            <div class="flex justify-between"><span>Active Stream Particles:</span><span class="font-mono text-slate-200" id="particle-count">0</span></div>
            <div class="flex justify-between"><span>Visual Mode:</span><span class="font-mono text-cyan-500">Satellite Flow Overlay</span></div>
            <div class="flex justify-between"><span>Status:</span><span class="font-mono text-emerald-400 font-bold" id="status-text">Loading Data...</span></div>
        </div>
    </div>

    <div class="absolute bottom-6 right-6 bg-slate-950/90 backdrop-blur-md px-4 py-3 rounded-lg border border-slate-800 text-white z-10 shadow-2xl text-xs max-w-xs">
        <p class="font-semibold text-slate-300 mb-2 tracking-wide uppercase text-[10px]">Relative Vorticity Legend (s⁻¹)</p>
        <div class="h-3 w-full rounded bg-gradient-to-r from-red-600 via-orange-400 via-slate-800 via-cyan-500 to-emerald-400"></div>
        <div class="flex justify-between font-mono text-[10px] text-slate-400 mt-1 gap-4">
            <span>-5.0×10⁻⁴<br><span class="text-red-400">Anticyclonic</span></span>
            <span class="text-center">0.0<br>Neutral</span>
            <span class="text-right">+5.0×10⁻⁴<br><span class="text-emerald-400">Cyclonic</span></span>
        </div>
    </div>

    <div id="canvas-container" class="w-full h-screen"></div>

    <script>
        // --- 1. INITIALIZE SCENE & GLOBE STAGE ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 40, 140); // Tilted camera angle to replicate your exact screenshot layout

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 75;
        controls.maxDistance = 220;

        const globeRadius = 60;

        // --- 2. ADD SCENE LIGHTING (Crucial for Realistic Textures) ---
        // Ambient light illuminates everything equally so oceans aren't pitch black
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
        scene.add(ambientLight);

        // Directional sunlight to create subtle depths along edge curves
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.35);
        sunLight.position.set(5, 3, 5);
        scene.add(sunLight);

        // --- 3. APPLY PHOTOREALISTIC SATELLITE TEXTURES ---
        const textureLoader = new THREE.TextureLoader();
        
        // High-definition cloudless global satellite color map asset
        const satelliteTexture = textureLoader.load(
            'https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg',
            function(texture) {
                renderer.render(scene, camera);
            }
        );

        // Optional specular maps add natural glints over water reflections
        const specularTexture = textureLoader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');

        const landGlobeGeo = new THREE.SphereGeometry(globeRadius, 64, 64); // Increased segments for perfect smoothness
        const landGlobeMat = new THREE.MeshPhongMaterial({
            map: satelliteTexture,
            specularMap: specularTexture,
            specular: new THREE.Color('#111111'),
            shininess: 25,
            bumpScale: 0.05
        });
        const landGlobe = new THREE.Mesh(landGlobeGeo, landGlobeMat);
        scene.add(landGlobe);

        // Subdued tracking grid wireframe layer overlay
        const gridGeo = new THREE.SphereGeometry(globeRadius + 0.1, 36, 18);
        const gridMat = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            wireframe: true,
            transparent: true,
            opacity: 0.04 // Soft look so it doesn't clutter up the geography landmarks
        });
        const gridGlobe = new THREE.Mesh(gridGeo, gridMat);
        scene.add(gridGlobe);

        // --- 4. DATA AND ENGINE RUNTIME FIELDS ---
        let weatherData = null; 
        let particleSystem = null;
        let particleCount = 20000; 
        let particleData = [];
        let positionsArray, colorsArray, ageArray;

        const pressureLevelsText = [
            "1000 hPa (Surface)", "900 hPa (Lower Boundary)", "850 hPa (Low-Atmosphere)", 
            "800 hPa (Low-Condensation)", "700 hPa (Low-Troposphere)", "600 hPa (Mid-Low Layer)",
            "500 hPa (Mid-Trop / Storms)", "400 hPa (Upper-Mid Layer)", "300 hPa (Jet Stream)", 
            "200 hPa (Tropopause)", "10 hPa (Stratosphere)"
        ];
        let currentLevelIndex = 6; 

        // --- 5. FETCH DATA FROM PARSED JSON ---
        async function loadData() {
            try {
                const response = await fetch('./data_output.json');
                weatherData = await response.json();
                
                document.getElementById('status-text').innerText = "Online";
                document.getElementById('status-text').className = "font-mono text-emerald-400 font-bold";
                
                initParticleEngine();
            } catch (err) {
                console.error("Data processing fault: ", err);
                document.getElementById('status-text').innerText = "Data Load Error";
            }
        }

        // --- 6. DATA MATRIX LOOKUP ---
        function getRealVorticity(latRad, lonRad, levelIdx) {
            if (!weatherData) return 0;

            let latDeg = latRad * (180 / Math.PI);
            let lonDeg = lonRad * (180 / Math.PI);
            if (lonDeg < 0) lonDeg += 360;

            const targetLats = weatherData.latitudes;
            const targetLons = weatherData.longitudes;

            let latIdx = Math.floor(((90 - latDeg) / 180) * (targetLats.length - 1));
            let lonIdx = Math.floor((lonDeg / 360) * (targetLons.length - 1));

            latIdx = Math.max(0, Math.min(latIdx, targetLats.length - 1));
            lonIdx = Math.max(0, Math.min(lonIdx, targetLons.length - 1));

            return weatherData.vorticity_data[levelIdx][latIdx][lonIdx];
        }

        // --- 7. SHADER ENGINE WITH GLOW TRAIL PARTICLES ---
        function initParticleEngine() {
            document.getElementById('particle-count').innerText = particleCount.toLocaleString();

            const geometry = new THREE.BufferGeometry();
            positionsArray = new Float32Array(particleCount * 3);
            colorsArray = new Float32Array(particleCount * 3);
            ageArray = new Float32Array(particleCount); 

            for (let i = 0; i < particleCount; i++) {
                resetParticleState(i, true); 
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positionsArray, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));
            geometry.setAttribute('pAge', new THREE.BufferAttribute(ageArray, 1));

            const material = new THREE.ShaderMaterial({
                vertexShader: `
                    attribute vec3 color;
                    attribute float pAge;
                    varying vec3 vColor;
                    varying float vAlpha;
                    void main() {
                        vColor = color;
                        vAlpha = 1.0 - pAge; 
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = 2.5 * (130.0 / -mvPosition.z);
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    varying float vAlpha;
                    void main() {
                        if (length(gl_PointCoord - vec2(0.5)) > 0.5) discard;
                        gl_FragColor = vec4(vColor, vAlpha * 0.9);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);

            animateLoop();
        }

        function resetParticleState(i, randomAge = false) {
            const phi = Math.acos(Math.random() * 2 - 1);
            const theta = Math.random() * Math.PI * 2;

            const maxLife = 20 + Math.floor(Math.random() * 30);
            particleData[i] = {
                phi: phi,
                theta: theta,
                age: randomAge ? Math.floor(Math.random() * maxLife) : 0,
                maxAge: maxLife
            };

            updateGeometryBuffers(i, phi, theta);
        }

        function updateGeometryBuffers(i, phi, theta) {
            const idx = i * 3;
            // Particles hover slightly above land features (offset by pressure heights)
            const dynamicRadius = globeRadius + 0.8 + (currentLevelIndex * 0.4);

            positionsArray[idx]     = dynamicRadius * Math.sin(phi) * Math.cos(theta);
            positionsArray[idx + 1] = dynamicRadius * Math.cos(phi);
            positionsArray[idx + 2] = dynamicRadius * Math.sin(phi) * Math.sin(theta);
        }

        // --- 8. ANIMATION FLOW LOOP ---
        function animateLoop() {
            requestAnimationFrame(animateLoop);

            const posAttr = particleSystem.geometry.attributes.position;
            const colAttr = particleSystem.geometry.attributes.color;
            const ageAttr = particleSystem.geometry.attributes.pAge;

            // Slow uniform rotation of the satellite globe and vectors
            landGlobe.rotation.y += 0.0002;
            gridGlobe.rotation.y += 0.0002;
            particleSystem.rotation.y += 0.0002;

            for (let i = 0; i < particleCount; i++) {
                let p = particleData[i];
                p.age += 1;

                if (p.age >= p.maxAge) {
                    resetParticleState(i, false);
                    continue;
                }

                ageArray[i] = p.age / p.maxAge;

                const latRad = Math.PI / 2 - p.phi;
                const lonRad = p.theta;

                const voVal = getRealVorticity(latRad, lonRad, currentLevelIndex);
                const speedScale = voVal * 4200;
                const baseZonalFlow = 0.4; 

                p.phi   -= (Math.sin(lonRad * 3) * speedScale) * 0.002;
                p.theta += (baseZonalFlow + Math.cos(latRad * 2) * speedScale) * 0.002;

                updateGeometryBuffers(i, p.phi, p.theta);

                const colorIdx = i * 3;
                const normalizedIntensity = Math.min(Math.abs(voVal) * 23000, 1.0);

                if (voVal >= 0) {
                    colorsArray[colorIdx]     = 0.0;
                    colorsArray[colorIdx + 1] = 0.5 + (normalizedIntensity * 0.5); // Neon Cyan Storm Tracks
                    colorsArray[colorIdx + 2] = 1.0;
                } else {
                    colorsArray[colorIdx]     = 1.0;                               // Fiery Orange High Pressure
                    colorsArray[colorIdx + 1] = 0.3 + (normalizedIntensity * 0.4);
                    colorsArray[colorIdx + 2] = 0.1;
                }
            }

            posAttr.needsUpdate = true;
            colAttr.needsUpdate = true;
            ageAttr.needsUpdate = true;

            controls.update();
            renderer.render(scene, camera);
        }

        // --- 9. WINDOW & SLIDER ADAPTERS ---
        const slider = document.getElementById('level-slider');
        const display = document.getElementById('level-display');

        slider.addEventListener('input', (e) => {
            currentLevelIndex = parseInt(e.target.value);
            display.innerText = pressureLevelsText[currentLevelIndex];
            
            if (particleSystem) {
                for (let i = 0; i < particleCount; i++) {
                    resetParticleState(i, true);
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        loadData();
    </script>
</body>
</html>
